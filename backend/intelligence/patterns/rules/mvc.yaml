name: MVC
category: ARCHITECTURAL
type: MVC

participants:
  route:
    type: ROUTE
  controller:
    type: CLASS
    name_pattern: ".*(?i)Controller.*"
  service:
    type: CLASS
    name_pattern: ".*(?i)Service.*"
  repository:
    type: CLASS
    name_pattern: ".*(?i)Repository.*"

relationships:
  - source: route
    target: controller
    type: EXPOSES
  - source: controller
    target: service
    type: CALLS
  - source: service
    target: repository
    type: USES

confidence:
  base: 0.9
